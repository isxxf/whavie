<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: comun('Whavie - Recuperar Contraseña', 'auth')}"></head>
<body class="auth-body">
<div class="auth-wrapper">
    <div class="auth-container">
        <div class="auth-header">
            <span class="tab active">RECUPERAR CONTRASEÑA</span>
        </div>
        <p class="auth-helper">Ingresá tu nueva contraseña para continuar.</p>
        <form id="resetForm" class="auth-form">
            <input type="hidden" id="resetToken" name="token" />
            <div class="input-group">
                <label for="password">Nueva contraseña</label>
                <input type="password"
                       id="password"
                       name="password"
                       required
                       autocomplete="new-password"
                       placeholder="••••••••">
            </div>
            <div class="input-group">
                <label for="confirmPassword">Repetir contraseña</label>
                <input type="password"
                       id="confirmPassword"
                       name="confirmPassword"
                       required
                       autocomplete="new-password"
                       placeholder="••••••••">
            </div>
            <button type="button" id="btn-reset" class="btn-primary">Actualizar contraseña</button>
        </form>
        <div class="auth-footer">
            <p>¿Ya la recordaste? <a th:href="@{/login}">Volver a iniciar sesión</a></p>
        </div>
    </div>
</div>
<script src="/js/main.js"></script>
<script src="/js/reset-password.js"></script>
</body>
</html>
