<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: comun('Whavie - Iniciar Sesión', 'auth')}"></head>
<body class="auth-body">
<div class="auth-wrapper">
    <div class="aviso-auth aviso-error" th:if="${param.error}">
        <i class="fas fa-exclamation-circle"></i> Usuario o contraseña incorrectos.
    </div>
    <div class="aviso-auth aviso-success" th:if="${param.registrado}">
        <i class="fas fa-check-circle"></i> ¡Cuenta creada! Ya podés iniciar sesión.
    </div>
    <div class="auth-container">
        <div class="auth-header">
            <a th:href="@{/login}"
               class="tab"
               th:classappend="${pagina == 'login'} ? 'active'">
                INICIAR SESIÓN
            </a>
            <a th:href="@{/registro}"
               class="tab"
               th:classappend="${pagina == 'register'} ? 'active'">
                REGISTRARSE
            </a>
        </div>
        <form id="loginForm" class="auth-form" th:action="@{/login}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <div class="input-group">
                <label for="username">Usuario o Email</label>
                <input type="text"
                       id="username"
                       name="username"
                       required
                       autocomplete="username"
                       placeholder="ejemplo@mail.com">
            </div>
            <div class="input-group">
                <label for="password">Contraseña</label>
                <input type="password"
                       id="password"
                       name="password"
                       required
                       autocomplete="current-password"
                       placeholder="••••••••">
            </div>
            <div class="form-options">
                <label class="checkbox-container">
                    <input type="checkbox" id="rememberMe" name="remember-me" checked="checked">
                    <span class="checkmark"></span>
                    Recordarme
                </label>
                <a href="#" class="forgot-link" id="forgotLink">¿Olvidaste tu contraseña?</a>
            </div>
            <button type="submit" class="btn-primary">Iniciar sesión</button>
            <a href="/oauth2/authorization/google" class="btn-google">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                          fill="#4285F4"></path>
                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                          fill="#34A853"></path>
                    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
                          fill="#FBBC05"></path>
                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                          fill="#EA4335"></path>
                </svg>
                Iniciar sesión con Google
            </a>
        </form>
        <div class="auth-footer">
            <p>¿No tienes cuenta? <a th:href="@{/registro}">Regístrate aquí.</a></p>
        </div>
    </div>
</div>

<div class="modal-overlay" id="forgotModal" aria-hidden="true">
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="forgotTitle">
        <button class="modal-close" type="button" id="forgotClose" aria-label="Cerrar">&times;</button>
        <h3 id="forgotTitle" class="modal-title">Recuperar contraseña</h3>
        <p class="modal-text">Ingresá tu email para enviarte el link de recuperación.</p>
        <form id="forgotForm" class="auth-form">
            <div class="input-group">
                <label for="forgotEmail">Email</label>
                <input type="email" id="forgotEmail" name="email" required autocomplete="email" placeholder="ejemplo@mail.com">
            </div>
            <button type="button" id="forgotSubmit" class="btn-primary">Enviar link</button>
        </form>
    </div>
</div>

<script src="/js/main.js"></script>
<script src="/js/forgot-password.js"></script>
</body>
</html>
