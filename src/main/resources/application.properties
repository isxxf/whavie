spring.application.name=whavie
# ========================
# Server Configuration
# ========================
server.port=${PORT:8080}
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=lax
# ========================
# Base de datos PostgreSQL
# ========================
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/whavie}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=5
# ========================
# JPA / Hibernate
# ========================
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:validate}
spring.jpa.show-sql=${SHOW_SQL:false}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false
# ========================
# TMDB API
# ========================
tmdb.api.url=https://api.themoviedb.org/3
tmdb.api.token=${TMDB_API_TOKEN}
# ========================
# EMAIL
# ========================
spring.mail.host=smtp.sendgrid.net
spring.mail.port=587
spring.mail.username=apikey
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
# ========================
# Google OAuth2
# ========================
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.scope=email,profile
# ========================
# Security - Remember Me
# ========================
remember.me.key=${REMEMBER_ME_KEY}
# ========================
# Security - CORS
# ========================
app.allowed-origins=${ALLOWED_ORIGINS:http://localhost:3000,http://localhost:8080}
# ========================
# APP URL (para generación de enlaces en correos, etc.)
# ========================
app.url=${APP_URL:http://localhost:8080}
